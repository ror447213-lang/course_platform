<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - CourseStore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/index.html" class="nav-brand">⚡ CourseStore</a>
  <ul class="nav-links" id="navLinks"><div id="navAuth"></div></ul>
</nav>
<div class="payment-container">
  <div class="breadcrumb"><a href="/index.html">Home</a> › <span>Payment</span></div>
  <div id="paymentContent"><div class="loading-overlay"><div class="loading-spinner"></div><p>Generating payment details...</p></div></div>
  <div id="successScreen" class="hidden" style="text-align:center;padding:4rem 2rem;">
    <div style="font-size:5rem;margin-bottom:1.5rem;">🎉</div>
    <h2 style="margin-bottom:1rem;font-size:2rem;">Payment Submitted!</h2>
    <p style="color:var(--text-secondary);max-width:480px;margin:0 auto 2rem;line-height:1.7;">Your payment is under review. Our team will verify it within <strong style="color:var(--accent);">24-48 hours</strong>. You'll receive an email with your download link once approved.</p>
    <div class="badge badge-pending" style="margin:0 auto 2rem;padding:12px 24px;font-size:0.95rem;display:inline-flex;">🕐 Verification Pending</div>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="/dashboard.html" class="btn btn-primary btn-lg">📊 View Dashboard</a>
      <a href="/index.html" class="btn btn-ghost btn-lg">🏠 Back to Home</a>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
if(!requireAuth()) throw new Error('Auth required');
updateNavigation();
const courseId = new URLSearchParams(window.location.search).get('course_id');
if(!courseId) window.location.href='/index.html';
let selectedFile=null;

async function loadPaymentPage() {
  try {
    const qrData = await PaymentsAPI.getQR(courseId);
    document.getElementById('paymentContent').innerHTML = `
      <div class="payment-grid">
        <div>
          <div class="glass-card" style="padding:2rem;text-align:center;margin-bottom:1.5rem;">
            <h3 style="margin-bottom:1.5rem;font-size:1.1rem;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1px;">📱 Scan & Pay</h3>
            <div class="qr-box"><img src="${qrData.qr_code}" alt="UPI QR Code"><div style="font-size:0.8rem;color:#666;margin-top:0.75rem;">Scan with any UPI app</div></div>
            <div class="amount-display">${formatCurrency(qrData.amount)}</div>
            <div class="upi-info">
              <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">UPI ID</div>
              <div class="upi-id" style="display:flex;align-items:center;justify-content:center;gap:8px;">${qrData.upi_id}<button onclick="copyToClipboard('${qrData.upi_id}','UPI ID')" style="background:none;border:none;cursor:pointer;color:var(--primary-light);">📋</button></div>
            </div>
            <div style="margin-top:1rem;padding:0.75rem;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;font-size:0.85rem;color:#F59E0B;">⚠️ Send exactly <strong>${formatCurrency(qrData.amount)}</strong></div>
          </div>
          <div class="glass-card" style="padding:1.25rem;">
            <p style="font-size:0.8rem;color:var(--text-muted);text-align:center;margin-bottom:0.75rem;">Supported UPI Apps</p>
            <div style="display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;">${['GPay','PhonePe','Paytm','BHIM','Amazon Pay'].map(a=>`<span style="padding:4px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;font-size:0.78rem;color:var(--text-secondary);">${a}</span>`).join('')}</div>
          </div>
        </div>
        <div class="payment-form-card">
          <h3 style="margin-bottom:0.5rem;">✅ Confirm Payment</h3>
          <p style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:1.5rem;">For course: <strong style="color:var(--primary-light);">${qrData.course_title}</strong></p>
          <div class="alert alert-info"><span>ℹ️</span><span>Submit your UTR number <strong>or</strong> a screenshot as proof.</span></div>
          <form id="paymentForm">
            <div class="form-group">
              <label class="form-label">UTR / Transaction ID</label>
              <input type="text" id="utrInput" class="form-input" placeholder="e.g. 123456789012">
            </div>
            <div class="divider">or upload screenshot</div>
            <div class="form-group">
              <label class="form-label">Payment Screenshot</label>
              <div class="upload-zone" id="uploadZone">
                <input type="file" id="screenshotInput" accept="image/*" onchange="handleFileSelect(this)">
                <div id="uploadContent"><div class="upload-icon">📸</div><div class="upload-text"><span>Click to upload</span> or drag & drop<br><small style="color:var(--text-muted);">PNG, JPG up to 5MB</small></div></div>
              </div>
            </div>
            <div id="filePreview" class="hidden" style="margin-bottom:1rem;">
              <div style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:8px;">
                <span style="font-size:1.5rem;">🖼️</span>
                <div style="flex:1;"><div style="font-size:0.85rem;font-weight:600;color:var(--accent);" id="fileName"></div><div style="font-size:0.75rem;color:var(--text-muted);" id="fileSize"></div></div>
                <button type="button" onclick="removeFile()" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1.1rem;">✕</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">🚀 Submit for Verification</button>
            <p class="text-sm text-muted text-center" style="margin-top:1rem;">⏱️ Verification takes 24-48 hours</p>
          </form>
        </div>
      </div>`;

    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
    document.getElementById('paymentForm').addEventListener('submit', submitPayment);
  } catch(err) {
    document.getElementById('paymentContent').innerHTML = `<div class="empty-state"><div class="empty-icon">${err.message.includes('purchased')?'✅':'⚠️'}</div><div class="empty-title">${err.message.includes('purchased')?'Already Purchased':'Error'}</div><div class="empty-text">${err.message}</div><a href="${err.message.includes('purchased')?'/dashboard.html':'/index.html'}" class="btn btn-primary" style="margin-top:1rem;">${err.message.includes('purchased')?'View Dashboard':'Go Back'}</a></div>`;
  }
}

function handleFileSelect(input) { if(input.files[0]) processFile(input.files[0]); }
function processFile(file) {
  if(!file.type.startsWith('image/')) { Toast.error('Please select an image file'); return; }
  if(file.size > 5*1024*1024) { Toast.error('File size must be less than 5MB'); return; }
  selectedFile=file;
  document.getElementById('fileName').textContent=file.name;
  document.getElementById('fileSize').textContent=`${(file.size/1024).toFixed(1)} KB`;
  document.getElementById('filePreview').classList.remove('hidden');
  document.getElementById('uploadZone').style.borderColor='var(--accent)';
}
function removeFile() {
  selectedFile=null;
  document.getElementById('screenshotInput').value='';
  document.getElementById('filePreview').classList.add('hidden');
  document.getElementById('uploadZone').style.borderColor='';
}
async function submitPayment(e) {
  e.preventDefault();
  const utr=document.getElementById('utrInput')?.value?.trim();
  const btn=document.getElementById('submitBtn');
  if(!utr&&!selectedFile) { Toast.warning('Please provide UTR number or screenshot'); return; }
  const formData=new FormData();
  if(utr) formData.append('utr_number',utr);
  if(selectedFile) formData.append('screenshot',selectedFile);
  setLoading(btn,true);
  try {
    await PaymentsAPI.submitPayment(courseId,formData);
    document.getElementById('paymentContent').classList.add('hidden');
    document.getElementById('successScreen').classList.remove('hidden');
    Toast.success('Payment submitted successfully!');
  } catch(err) { Toast.error(err.message); setLoading(btn,false); }
}
loadPaymentPage();
</script>
</body>
</html>
