<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Details - CourseStore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/index.html" class="nav-brand">⚡ CourseStore</a>
  <div id="hamburger" class="hamburger"><span></span><span></span><span></span></div>
  <ul class="nav-links" id="navLinks">
    <li><a href="/index.html">Home</a></li>
    <div id="navAuth"></div>
  </ul>
</nav>
<div style="max-width:900px;margin:3rem auto;padding:0 2rem;">
  <div class="breadcrumb">
    <a href="/index.html">Home</a><span>›</span><a href="/index.html#courses">Courses</a><span>›</span><span id="breadcrumbTitle">Loading...</span>
  </div>
  <div id="courseContent"><div class="loading-overlay"><div class="loading-spinner"></div><p>Loading course...</p></div></div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
updateNavigation();
const courseId = new URLSearchParams(window.location.search).get('id');
if(!courseId) window.location.href='/index.html';

async function loadCourse() {
  try {
    const course = await CoursesAPI.get(courseId);
    document.getElementById('breadcrumbTitle').textContent = course.title;
    document.title = `${course.title} - CourseStore`;
    let isPurchased=false, downloadLink=null;
    if(TokenManager.isLoggedIn()) {
      try { const d=await CoursesAPI.getDownload(courseId); isPurchased=true; downloadLink=d.download_link; } catch(e) {}
    }
    const thumbHTML = course.thumbnail_url
      ? `<img src="${course.thumbnail_url}" alt="${course.title}" style="width:100%;height:360px;object-fit:cover;border-radius:var(--radius);" onerror="this.style.display='none'">`
      : `<div style="width:100%;height:360px;background:linear-gradient(135deg,#1e1b4b,#312e81);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:6rem;">📚</div>`;
    document.getElementById('courseContent').innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start;">
        <div>
          ${thumbHTML}
          <div class="glass-card" style="padding:2rem;margin-top:1.5rem;">
            <h2 style="margin-bottom:1rem;">📋 About This Course</h2>
            <p style="color:var(--text-secondary);line-height:1.8;white-space:pre-line;">${course.description}</p>
          </div>
          ${isPurchased&&downloadLink?`<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:var(--radius);padding:2rem;margin-top:1.5rem;text-align:center;"><div style="font-size:3rem;margin-bottom:1rem;">🎉</div><h3 style="color:#22C55E;margin-bottom:0.75rem;">You Own This Course!</h3><a href="${downloadLink}" target="_blank" class="btn btn-accent btn-lg">📥 Access Course Materials</a></div>`:''}
        </div>
        <div style="position:sticky;top:90px;">
          <div class="glass-card" style="padding:2rem;">
            <div style="text-align:center;margin-bottom:1.5rem;"><div style="font-size:2.8rem;font-weight:800;color:var(--accent);">${formatCurrency(course.price)}</div><div style="color:var(--text-muted);font-size:0.85rem;margin-top:4px;">One-time payment</div></div>
            ${isPurchased?`<div class="badge badge-approved" style="width:100%;justify-content:center;padding:12px;font-size:0.9rem;margin-bottom:1rem;">✅ Already Purchased</div><a href="${downloadLink}" target="_blank" class="btn btn-accent btn-full btn-lg">📥 Access Now</a>`:`<a href="${TokenManager.isLoggedIn()?`/payment.html?course_id=${courseId}`:'/login.html'}" class="btn btn-primary btn-full btn-lg">🛒 Buy Now - ${formatCurrency(course.price)}</a>`}
            <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
              <div style="display:flex;flex-direction:column;gap:0.75rem;">
                <div style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-secondary);"><span>♾️</span> Lifetime access</div>
                <div style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-secondary);"><span>📥</span> Instant download after verification</div>
                <div style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-secondary);"><span>🔒</span> Secure UPI payment</div>
                <div style="display:flex;align-items:center;gap:10px;font-size:0.9rem;color:var(--text-secondary);"><span>📧</span> Email delivery</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
  } catch(err) {
    document.getElementById('courseContent').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Course Not Found</div><div class="empty-text">${err.message}</div><a href="/index.html" class="btn btn-primary" style="margin-top:1rem;">← Back to Home</a></div>`;
  }
}
loadCourse();
</script>
</body>
</html>
