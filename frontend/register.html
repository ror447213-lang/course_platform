<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - CourseStore</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <a href="/index.html" class="nav-brand">⚡ CourseStore</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="/index.html">Home</a></li>
    <li><a href="/login.html" class="btn-nav">Login</a></li>
  </ul>
</nav>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">⚡ CourseStore</div>
      <p class="auth-subtitle">Create your account and start learning today.</p>
    </div>
    <div id="alertBox"></div>
    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Min. 6 characters" required>
        <div style="margin-top:8px;"><div id="strengthBar" style="height:4px;border-radius:2px;background:var(--border);overflow:hidden;"><div id="strengthFill" style="height:100%;width:0;transition:all 0.3s;border-radius:2px;"></div></div><span id="strengthText" class="text-sm" style="font-size:0.75rem;"></span></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="Repeat your password" required>
      </div>
      <div style="margin-bottom:1.5rem;">
        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
          <input type="checkbox" id="agree" required style="margin-top:3px;accent-color:var(--primary);">
          <span class="text-sm text-muted">I agree to the <a href="#" style="color:var(--primary-light);">Terms</a> and <a href="#" style="color:var(--primary-light);">Privacy Policy</a></span>
        </label>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">✨ Create Account</button>
    </form>
    <div class="divider">or</div>
    <p class="text-center text-sm" style="color:var(--text-muted);">Already have an account? <a href="/login.html" style="color:var(--primary-light);font-weight:600;">Sign in →</a></p>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/app.js"></script>
<script>
redirectIfLoggedIn();
document.getElementById('password').addEventListener('input', function() {
  const v = this.value;
  let s = 0;
  if(v.length>=6)s++; if(v.match(/[A-Z]/))s++; if(v.match(/[0-9]/))s++; if(v.match(/[^A-Za-z0-9]/))s++;
  const colors=['#EF4444','#F59E0B','#3B82F6','#22C55E'];
  const labels=['Weak','Fair','Good','Strong'];
  const widths=['25%','50%','75%','100%'];
  const fill=document.getElementById('strengthFill');
  const text=document.getElementById('strengthText');
  if(v.length===0){fill.style.width='0';text.textContent='';}
  else{fill.style.width=widths[s-1]||'25%';fill.style.background=colors[s-1]||colors[0];text.textContent=`Strength: ${labels[s-1]||'Weak'}`;text.style.color=colors[s-1]||colors[0];}
});
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  document.getElementById('alertBox').innerHTML = '';
  const password = document.getElementById('password').value;
  if(password !== document.getElementById('confirmPassword').value) {
    document.getElementById('alertBox').innerHTML = '<div class="alert alert-danger"><span>❌</span><span>Passwords do not match</span></div>';
    return;
  }
  setLoading(btn, true);
  try {
    await AuthAPI.register({ name: document.getElementById('name').value.trim(), email: document.getElementById('email').value.trim(), password });
    Toast.success('Account created! Signing you in...');
    const loginData = await AuthAPI.login({ email: document.getElementById('email').value.trim(), password });
    TokenManager.set(loginData.access_token);
    TokenManager.setUser({ name: loginData.name, role: loginData.role });
    setTimeout(() => window.location.href = '/dashboard.html', 800);
  } catch(err) {
    document.getElementById('alertBox').innerHTML = `<div class="alert alert-danger"><span>❌</span><span>${err.message}</span></div>`;
    setLoading(btn, false);
  }
});
</script>
</body>
</html>
